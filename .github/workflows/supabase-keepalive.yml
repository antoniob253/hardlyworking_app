name: Supabase Keep-Alive

# Supabase pauses Free-plan projects with insufficient DATABASE activity over
# a rolling 7-day window. Per Supabase's own docs, the threshold is framed in
# DAILY terms:
#
#   "A Free plan project is considered inactive if it does not receive
#    sufficient user database activity over the past week ... Typically a few
#    user requests to the database each day over the previous week is enough
#    to keep the project from being paused."
#   https://supabase.com/docs/guides/platform/free-project-pausing
#
# An earlier version of this workflow ran only 3x/week (Mon/Wed/Fri). The DB
# writes succeeded and rows landed, but 4 of every 7 days had zero activity —
# below the "a few requests each day" bar — and the project was paused anyway.
#
# Fix: run DAILY (twice, for redundancy against GitHub occasionally delaying or
# dropping a scheduled run) and issue a few writes per run, so every day has
# unambiguous database activity.
#
# Credentials live in repo secrets, never in this file:
#   SUPABASE_URL            https://<ref>.supabase.co
#   SUPABASE_KEEPALIVE_KEY  the public "publishable" (anon) key already shipped
#                           in the app; the keep_alive RLS policy grants this
#                           key INSERT-only on that one table.

on:
  schedule:
    # 06:14 and 18:14 UTC, every day. Two runs ~12h apart means every calendar
    # day gets activity even if one run is delayed or dropped. The :14 minute
    # avoids top-of-the-hour congestion when GitHub is most likely to skip jobs.
    - cron: "14 6 * * *"
    - cron: "14 18 * * *"
  # Lets us trigger a run by hand from the Actions tab to verify it works.
  workflow_dispatch: {}

# Don't cancel an in-flight ping; let every run finish. Just avoid piling up.
concurrency:
  group: supabase-keepalive
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Insert keep-alive pings
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEEPALIVE_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_KEY:-}" ]; then
            echo "::error::Missing SUPABASE_URL or SUPABASE_KEEPALIVE_KEY secret."
            exit 1
          fi

          # Issue a few separate writes so the day clearly registers as active.
          # Each POST of an empty object inserts a row using column defaults
          # (id identity, pinged_at now(), source default). Prefer: return=minimal
          # -> HTTP 201 with no body, so the anon role needs only INSERT.
          PINGS=3
          for i in $(seq 1 "$PINGS"); do
            status=$(curl --silent --show-error --fail-with-body \
              --output /dev/stderr --write-out "%{http_code}" \
              --max-time 30 \
              -X POST "${SUPABASE_URL}/rest/v1/keep_alive" \
              -H "apikey: ${SUPABASE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_KEY}" \
              -H "Content-Type: application/json" \
              -H "Prefer: return=minimal" \
              -d '{}') || {
                echo "::error::Keep-alive request $i/$PINGS failed (HTTP ${status:-000})."
                exit 1
              }

            if [ "$status" != "201" ]; then
              echo "::error::Request $i/$PINGS: expected HTTP 201, got ${status}."
              exit 1
            fi
            echo "Ping $i/$PINGS inserted (HTTP ${status})."
            sleep 1
          done

          echo "Keep-alive complete: ${PINGS} pings inserted."
